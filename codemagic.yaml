workflows:
  ios_testflight:
    name: iOS TestFlight (IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.FaisalZahrani.ABTFApp
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Flutter packages get
        script: flutter pub get
      - name: Configure code signing (App Store Connect)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "${CM_BUNDLE_IDENTIFIER}" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # In Codemagic UI, set APP_STORE_CONNECT_API_KEY as the contents of the .p8 file.
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
