workflows:
  ios_testflight:
    name: iOS TestFlight (IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Code_ABTF_MAGIC
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.FaisalZahrani.ABTFApp
      vars:
        BUNDLE_ID: "com.FaisalZahrani.ABTFApp"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Flutter packages get
        script: flutter pub get
      - name: Configure code signing (App Store Connect)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "${BUNDLE_ID}" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - build/**/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - build/ios/archive/*.xcresult
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
